<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wash Services</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <section class="header">
        <div class="navbar">
            <div class="box logo">
                 <img src="images/logo.png" alt="logo">
            </div>

            <div class="box content">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </div>

            <div class="box username">
                <p>Username</p>
            </div>
        
        </div>
    </section>

    <section class="herosection">
        <div class="leftdiv">
            <div class="heading">
                <h1>Revitalize Your Clothes with Expert <span style="color: rgb(0, 187, 255);" >Laundry Services!</span></h1>
            </div>

            <div class="description">
                <h3>From premium dry cleaning to swift wash and fold, we deliver care and convenience. Schedule a pickup and rediscover the freshness of your clothes today!</h3>
            </div>

            <div class="booking">
                <button class="button">Book a service today!</button>
            </div>
        </div>

        <div class="rightdiv">
            <img src="images/washing-machine.jpg" alt="washing machine" class="washingmachineimg">
        </div>
    </section>
    
</body>
</html>
